[pytest]
testpaths = tests
# Intentionally avoid --basetemp here: Python 3.14/Windows tempfile dirs are
# unreliable in this environment, and tests override tmp_path with Path.mkdir().
addopts = -p no:cacheprovider
norecursedirs =
    .git
    .venv
    .tmp
    output
    example_output
    screenshots
    playlist-navigator-pro
    playlist-navigator-pro_green
    pytest-cache-files-*
    tmp*
